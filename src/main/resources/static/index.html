<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DevOps Assistant</title>
    <style>
        :root { --bg:#0f172a; --panel:#1e293b; --border:#334155; --fg:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --ok:#4ade80; --err:#f87171; }
        * { box-sizing: border-box; }
        body { margin:0; font-family: ui-sans-serif, system-ui, "PingFang TC", "Microsoft JhengHei", sans-serif; background:var(--bg); color:var(--fg); }
        header { padding:20px 24px; border-bottom:1px solid var(--border); }
        header h1 { margin:0; font-size:18px; }
        header p { margin:4px 0 0; color:var(--muted); font-size:13px; }
        main { max-width:900px; margin:0 auto; padding:24px; }
        .row { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
        label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
        input, textarea { width:100%; background:var(--panel); border:1px solid var(--border); color:var(--fg); border-radius:8px; padding:10px; font-size:14px; }
        textarea { min-height:60px; resize:vertical; }
        .grow { flex:1; min-width:220px; }
        .container-field { width:180px; }
        button { background:var(--accent); color:#00131f; border:none; border-radius:8px; padding:10px 16px; font-weight:600; cursor:pointer; font-size:14px; }
        button.secondary { background:transparent; color:var(--accent); border:1px solid var(--accent); }
        button:disabled { opacity:.5; cursor:not-allowed; }
        .actions { margin-top:12px; display:flex; gap:10px; flex-wrap:wrap; }
        .out { margin-top:20px; background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:16px; white-space:pre-wrap; word-break:break-word; font-size:13px; line-height:1.5; min-height:80px; }
        .status { font-size:12px; color:var(--muted); margin-top:8px; }
        .probe { border-bottom:1px solid var(--border); padding:8px 0; }
        .probe b { color:var(--accent); }
        .ok { color:var(--ok); } .err { color:var(--err); }
        code { background:#0b1220; padding:1px 5px; border-radius:4px; }
    </style>
</head>
<body>
<header>
    <h1>AI DevOps Assistant — 唯讀診斷</h1>
    <p>自然語言問題 → 選擇唯讀 probe 蒐證 → 現象 / 推測 / 證據 / 建議。不執行任何變更操作。</p>
</header>
<main>
    <div class="row">
        <div class="grow">
            <label>問題</label>
            <textarea id="question" placeholder="例如：為什麼這台 server 的 Tomcat 變慢？">為什麼這台 server 的 Tomcat 變慢？</textarea>
        </div>
        <div class="container-field">
            <label>container 名稱</label>
            <input id="container" list="containers-list" value="tomcat"
                   placeholder="輸入或選擇容器" autocomplete="off">
            <datalist id="containers-list"></datalist>
        </div>
    </div>
    <div class="actions">
        <button id="btnDiagnose" onclick="diagnose()">AI 診斷</button>
        <button class="secondary" onclick="collect()">純蒐證（不用 LLM）</button>
        <button class="secondary" onclick="listProbes()">列出 probe</button>
    </div>
    <div class="status" id="status"></div>
    <div class="out" id="out">結果會顯示在這裡。</div>
</main>

<script>
    const $ = id => document.getElementById(id);
    function setStatus(t) { $('status').textContent = t || ''; }
    function setOut(t) { $('out').textContent = t; }
    function busy(b) { $('btnDiagnose').disabled = b; }

    async function diagnose() {
        const question = $('question').value.trim();
        const container = $('container').value.trim() || 'tomcat';
        if (!question) { setStatus('請輸入問題'); return; }
        busy(true); setStatus('診斷中（會依需要多次呼叫 probe，可能需數十秒）…'); setOut('…');
        try {
            const r = await fetch('/api/diagnose', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question, container })
            });
            const data = await r.json();
            setOut(data.report || JSON.stringify(data));
            setStatus(r.ok ? '完成' : '發生錯誤');
        } catch (e) { setOut('請求失敗：' + e); setStatus(''); }
        finally { busy(false); }
    }

    async function collect() {
        const container = $('container').value.trim() || 'tomcat';
        setStatus('蒐證中…'); setOut('…');
        try {
            const r = await fetch('/api/collect?container=' + encodeURIComponent(container));
            const list = await r.json();
            setOut(list.map(x =>
                `## [${x.ok ? 'OK' : 'SKIP/ERR'}] ${x.probe}\n$ ${x.commands.join('; ')}\n${x.output || '(無輸出)'}`
            ).join('\n\n'));
            setStatus('完成，共 ' + list.length + ' 個 probe');
        } catch (e) { setOut('請求失敗：' + e); setStatus(''); }
    }

    // 載入時自動偵測執行中的容器，填入 datalist 下拉建議（仍可手動輸入）。
    async function loadContainers() {
        try {
            const r = await fetch('/api/containers');
            if (!r.ok) return;
            const names = await r.json();
            if (!Array.isArray(names) || names.length === 0) return;  // docker 不可用 → 保持可輸入
            $('containers-list').innerHTML =
                names.map(n => `<option value="${n}">`).join('');
            // 若目前仍是預設 tomcat 且偵測不到 tomcat，改帶第一個偵測到的容器
            const cur = $('container').value.trim();
            if ((cur === '' || cur === 'tomcat') && !names.includes('tomcat')) {
                $('container').value = names[0];
            }
        } catch (e) { /* graceful degrade：偵測失敗就當普通輸入框 */ }
    }

    async function listProbes() {
        setStatus('載入 probe 清單…'); setOut('…');
        try {
            const r = await fetch('/api/probes');
            const list = await r.json();
            $('out').innerHTML = list.map(p =>
                `<div class="probe"><b>${p.name}</b> <span style="color:#94a3b8">[${p.category}]</span>${p.needsContainer ? ' <span style="color:#94a3b8">(需 container)</span>' : ''}<br>${p.description}</div>`
            ).join('');
            setStatus('共 ' + list.length + ' 個 probe');
        } catch (e) { setOut('請求失敗：' + e); setStatus(''); }
    }

    loadContainers();  // 頁面載入即偵測容器
</script>
</body>
</html>
