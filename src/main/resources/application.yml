server:
  port: 8080

# LLM provider 切換：anthropic（預設，雲端）或 ollama（本地）。
# 用環境變數覆寫，如 LLM_PROVIDER=ollama。
app:
  # 外部配置目錄（BACKLOG #5）。留空則只用內建預設；設定後，該目錄若有同名檔
  # （incidents.yaml / logformat.yaml / probes.yaml）就整檔覆蓋內建（仍過 fail-fast + 白名單）。
  config:
    dir: ${CONFIG_DIR:}
  llm:
    provider: ${LLM_PROVIDER:anthropic}
    # 模型是否支援 function calling。true（預設）走工具迴圈讓模型自選 probe；
    # 本地小模型若不支援 function calling，設 false 改走「先蒐全部證據→模型摘要」fallback。
    tool-calling: ${LLM_TOOL_CALLING:true}

spring:
  main:
    banner-mode: "off"              # web/CLI 模式由 main() 依參數決定
  ai:
    anthropic:
      # 未設定環境變數時給 dummy，讓 --collect-only / --list-probes 可離線執行
      api-key: ${ANTHROPIC_API_KEY:dummy}
      chat:
        options:
          model: claude-sonnet-4-5
          max-tokens: 4096
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      # 啟動時不自動拉模型；請先自行 `ollama pull <model>`
      init:
        pull-model-strategy: never
      chat:
        options:
          # 需挑「支援 tool/function calling」的模型（如 qwen2.5、llama3.1）
          model: ${OLLAMA_MODEL:qwen2.5}

logging:
  level:
    root: WARN                      # 保持 CLI 輸出乾淨
